services:
  http-server-projeto-korp:
    build: .
    container_name: http-server-projeto-korp
    restart: unless-stopped
    networks:
      - devops-korp
  nginx:
    image: nginx:1.28-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      http-server-projeto-korp:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - devops-korp
    volumes:
      - ./nginx/:/etc/nginx/conf.d/
  # No depends_on: the monitoring stack starts independently of the service it
  # observes, so Prometheus records downtime (up == 0) instead of not running.
  otel-lgtm:
    image: grafana/otel-lgtm:0.28.0
    container_name: otel-lgtm
    restart: unless-stopped
    ports:
      - "3000:3000"  # Grafana UI
      - "9090:9090"  # Prometheus UI (targets / ad-hoc queries)
    networks:
      - devops-korp
    volumes:
      - ./observability/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ./observability/grafana/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/projeto-korp.yaml:ro
      - ./observability/grafana/dashboards:/otel-lgtm/grafana/dashboards:ro
networks:
  # Provisioned outside Compose (by the Ansible playbook, or manually with
  # `docker network create devops-korp`) so the network is managed in one place.
  devops-korp:
    external: true
    name: devops-korp
