server {
    listen 80;
    server_name localhost;

    # Only the business endpoint is public. /metrics and /healthz stay
    # internal to the Docker network, where Prometheus and the container
    # healthcheck reach the service directly; anything else is 404 here.
    location = /projeto-korp {
        proxy_pass http://http-server-projeto-korp:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
